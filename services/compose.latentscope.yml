services:
  latentscope:
    container_name: ${HARBOR_CONTAINER_PREFIX}.latentscope
    build:
      context: ./services/latentscope
      dockerfile: Dockerfile
    environment:
      - LATENT_SCOPE_DATA=/root/latentscope-data
    env_file:
      - ./.env
      - ./services/latentscope/override.env
    ports:
      - ${HARBOR_LATENTSCOPE_HOST_PORT}:5001
    volumes:
      - ${HARBOR_HF_CACHE:-./services/latentscope/.hf-cache}:/root/.cache/huggingface
      - ${HARBOR_LATENTSCOPE_WORKSPACE}:/root/latentscope-data
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      latentscope-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  latentscope-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.latentscope-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/latentscope/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/latentscope/workspace-init.sh:/init.sh:ro
      - ${HARBOR_LATENTSCOPE_WORKSPACE}:/workspace
    networks:
      - harbor-network
