services:
  aider:
    volumes:
      # Mount into the same directory the merger scans (/home/appuser/.aider).
      - ./services/aider/configs/aider.unsloth-studio.yml:/home/appuser/.aider/unsloth-studio.yml
      # Read-only mount of the bootstrap sidecar's persisted key file. The
      # aider start script reads /run/unsloth-studio-auth/api_key.txt at
      # runtime and exports HARBOR_UNSLOTH_STUDIO_API_KEY before invoking
      # the YAML config merger. This bypasses Compose's create-time env
      # substitution, which would otherwise bake the placeholder key into
      # the rendered .aider.conf.yml on the very first
      # `harbor up unsloth-studio aider`.
      - ./services/unsloth-studio/.studio-auth:/run/unsloth-studio-auth:ro
    # Defer aider's start until the bootstrap sidecar has minted and
    # written both .env and the sidecar key file. Combined with the
    # runtime read in start_aider.sh, this makes the very first
    # `harbor up unsloth-studio aider` work end-to-end with no second pass.
    depends_on:
      unsloth-studio-bootstrap:
        condition: service_completed_successfully
