services:
  openterminal:
    container_name: ${HARBOR_CONTAINER_PREFIX}.openterminal
    image: ${HARBOR_OPENTERMINAL_IMAGE}:${HARBOR_OPENTERMINAL_VERSION}
    env_file:
      - ./.env
      - ./services/openterminal/override.env
    ports:
      - ${HARBOR_OPENTERMINAL_HOST_PORT}:8000
    environment:
      - OPEN_TERMINAL_API_KEY=${HARBOR_OPENTERMINAL_API_KEY}
      - OPEN_TERMINAL_PACKAGES=${HARBOR_OPENTERMINAL_PACKAGES}
      - OPEN_TERMINAL_PIP_PACKAGES=${HARBOR_OPENTERMINAL_PIP_PACKAGES}
      - OPEN_TERMINAL_EXECUTE_TIMEOUT=${HARBOR_OPENTERMINAL_EXECUTE_TIMEOUT}
      - OPEN_TERMINAL_ENABLE_TERMINAL=${HARBOR_OPENTERMINAL_ENABLE_TERMINAL}
      - OPEN_TERMINAL_ENABLE_NOTEBOOKS=${HARBOR_OPENTERMINAL_ENABLE_NOTEBOOKS}
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      openterminal-init:
        condition: service_completed_successfully
    volumes:
      - ${HARBOR_OPENTERMINAL_WORKSPACE}:/home/user
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://127.0.0.1:8000/health
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for oterm and others.
  openterminal-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.openterminal-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/openterminal/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/openterminal/workspace-init.sh:/init.sh:ro
      - ${HARBOR_OPENTERMINAL_WORKSPACE}:/workspace
    networks:
      - harbor-network
