services:
  hermes:
    container_name: ${HARBOR_CONTAINER_PREFIX}.hermes
    image: ${HARBOR_HERMES_IMAGE}:${HARBOR_HERMES_VERSION}
    env_file:
      - ./.env
      - ./services/hermes/override.env
    ports:
      - ${HARBOR_HERMES_HOST_PORT}:8642
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      hermes-init:
        condition: service_completed_successfully
    volumes:
      - ${HARBOR_HERMES_WORKSPACE}/data:/opt/data
    shm_size: "1g"
    tty: true
    stdin_open: true
    command: ["gateway", "run"]
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${HARBOR_HERMES_API_KEY}
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for oterm and others.
  hermes-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.hermes-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/hermes/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/hermes/workspace-init.sh:/init.sh:ro
      - ${HARBOR_HERMES_WORKSPACE}:/workspace
    networks:
      - harbor-network
