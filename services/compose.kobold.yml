services:
  kobold:
    container_name: ${HARBOR_CONTAINER_PREFIX}.kobold
    image: ${HARBOR_KOBOLD_IMAGE}:${HARBOR_KOBOLD_VERSION}
    env_file:
      - ./.env
      - ./services/kobold/override.env
    volumes:
      - ${HARBOR_KOBOLD_WORKSPACE}:/workspace/:rw
      - ${HARBOR_OLLAMA_CACHE}:/ollama
      - ${HARBOR_HF_CACHE:-./services/kobold/.hf-cache}:/hf
      - ${HARBOR_LLAMACPP_CACHE}:/llamacpp
      - ${HARBOR_VLLM_CACHE}:/vllm
    ports:
      - ${HARBOR_KOBOLD_HOST_PORT}:5001
    environment:
      - KCPP_MODEL=${HARBOR_KOBOLD_MODEL}
      - KCPP_ARGS=${HARBOR_KOBOLD_ARGS}
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      kobold-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  kobold-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.kobold-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/kobold/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/kobold/workspace-init.sh:/init.sh:ro
      - ${HARBOR_KOBOLD_WORKSPACE}:/workspace
    networks:
      - harbor-network
