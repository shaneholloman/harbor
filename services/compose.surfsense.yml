services:
  surfsense:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense
    image: ${HARBOR_SURFSENSE_PROXY_IMAGE}:${HARBOR_SURFSENSE_PROXY_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    ports:
      - ${HARBOR_SURFSENSE_HOST_PORT}:80
    volumes:
      - ./services/surfsense/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      surfsense-web:
        condition: service_started
      surfsense-backend:
        condition: service_healthy
      surfsense-zero:
        condition: service_healthy
    networks:
      - harbor-network

  surfsense-web:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-web
    image: ${HARBOR_SURFSENSE_WEB_IMAGE}:${HARBOR_SURFSENSE_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    environment:
      NEXT_PUBLIC_FASTAPI_BACKEND_URL: ${HARBOR_SURFSENSE_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_ZERO_CACHE_URL: ${HARBOR_SURFSENSE_PUBLIC_ZERO_URL}
      NEXT_PUBLIC_FASTAPI_BACKEND_AUTH_TYPE: ${HARBOR_SURFSENSE_AUTH_TYPE}
      NEXT_PUBLIC_ETL_SERVICE: ${HARBOR_SURFSENSE_ETL_SERVICE}
      NEXT_PUBLIC_DEPLOYMENT_MODE: self-hosted
      FASTAPI_BACKEND_INTERNAL_URL: http://surfsense-backend:8000
    depends_on:
      surfsense-backend:
        condition: service_healthy
      surfsense-zero:
        condition: service_healthy
    networks:
      - harbor-network

  surfsense-backend:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-backend
    image: ${HARBOR_SURFSENSE_BACKEND_IMAGE}:${HARBOR_SURFSENSE_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    ports:
      - ${HARBOR_SURFSENSE_BACKEND_HOST_PORT}:8000
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${HARBOR_SURFSENSE_WORKSPACE}/shared_tmp:/shared_tmp
      - ${HARBOR_HF_CACHE:-./services/surfsense/.hf-cache}:/root/.cache/huggingface
    environment:
      DATABASE_URL: postgresql+asyncpg://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}
      CELERY_BROKER_URL: redis://surfsense-redis:6379/0
      CELERY_RESULT_BACKEND: redis://surfsense-redis:6379/0
      REDIS_APP_URL: redis://surfsense-redis:6379/0
      CELERY_TASK_DEFAULT_QUEUE: surfsense
      PYTHONPATH: /app
      UVICORN_LOOP: asyncio
      UNSTRUCTURED_HAS_PATCHED_LOOP: "1"
      NEXT_FRONTEND_URL: ${HARBOR_SURFSENSE_PUBLIC_FRONTEND_URL}
      SEARXNG_DEFAULT_HOST: ${HARBOR_SURFSENSE_SEARXNG_URL}
      SERVICE_ROLE: api
      SECRET_KEY: ${HARBOR_SURFSENSE_SECRET_KEY}
      AUTH_TYPE: ${HARBOR_SURFSENSE_AUTH_TYPE}
      REGISTRATION_ENABLED: ${HARBOR_SURFSENSE_REGISTRATION_ENABLED}
      ETL_SERVICE: ${HARBOR_SURFSENSE_ETL_SERVICE}
      EMBEDDING_MODEL: ${HARBOR_SURFSENSE_EMBEDDING_MODEL}
      RERANKERS_ENABLED: ${HARBOR_SURFSENSE_RERANKERS_ENABLED}
      RERANKERS_MODEL_NAME: ${HARBOR_SURFSENSE_RERANKERS_MODEL_NAME}
      RERANKERS_MODEL_TYPE: ${HARBOR_SURFSENSE_RERANKERS_MODEL_TYPE}
      TTS_SERVICE: ${HARBOR_SURFSENSE_TTS_SERVICE}
      STT_SERVICE: ${HARBOR_SURFSENSE_STT_SERVICE}
      HF_TOKEN: ${HARBOR_HF_TOKEN}
      TOKENIZERS_PARALLELISM: ${HARBOR_SURFSENSE_TOKENIZERS_PARALLELISM}
      OMP_NUM_THREADS: ${HARBOR_SURFSENSE_OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${HARBOR_SURFSENSE_MKL_NUM_THREADS}
      OPENBLAS_NUM_THREADS: ${HARBOR_SURFSENSE_OPENBLAS_NUM_THREADS}
      NUMEXPR_NUM_THREADS: ${HARBOR_SURFSENSE_NUMEXPR_NUM_THREADS}
      STRIPE_PAGE_BUYING_ENABLED: "FALSE"
      NOLOGIN_MODE_ENABLED: ${HARBOR_SURFSENSE_NOLOGIN_MODE_ENABLED}
      DAYTONA_SANDBOX_ENABLED: "FALSE"
    depends_on:
      surfsense-db:
        condition: service_healthy
      surfsense-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 200s
    networks:
      - harbor-network

  surfsense-worker:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-worker
    image: ${HARBOR_SURFSENSE_BACKEND_IMAGE}:${HARBOR_SURFSENSE_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ${HARBOR_SURFSENSE_WORKSPACE}/shared_tmp:/shared_tmp
      - ${HARBOR_HF_CACHE:-./services/surfsense/.hf-cache}:/root/.cache/huggingface
    environment:
      DATABASE_URL: postgresql+asyncpg://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}
      CELERY_BROKER_URL: redis://surfsense-redis:6379/0
      CELERY_RESULT_BACKEND: redis://surfsense-redis:6379/0
      REDIS_APP_URL: redis://surfsense-redis:6379/0
      CELERY_TASK_DEFAULT_QUEUE: surfsense
      PYTHONPATH: /app
      SEARXNG_DEFAULT_HOST: ${HARBOR_SURFSENSE_SEARXNG_URL}
      SERVICE_ROLE: worker
      SECRET_KEY: ${HARBOR_SURFSENSE_SECRET_KEY}
      AUTH_TYPE: ${HARBOR_SURFSENSE_AUTH_TYPE}
      REGISTRATION_ENABLED: ${HARBOR_SURFSENSE_REGISTRATION_ENABLED}
      ETL_SERVICE: ${HARBOR_SURFSENSE_ETL_SERVICE}
      EMBEDDING_MODEL: ${HARBOR_SURFSENSE_EMBEDDING_MODEL}
      RERANKERS_ENABLED: ${HARBOR_SURFSENSE_RERANKERS_ENABLED}
      RERANKERS_MODEL_NAME: ${HARBOR_SURFSENSE_RERANKERS_MODEL_NAME}
      RERANKERS_MODEL_TYPE: ${HARBOR_SURFSENSE_RERANKERS_MODEL_TYPE}
      TTS_SERVICE: ${HARBOR_SURFSENSE_TTS_SERVICE}
      STT_SERVICE: ${HARBOR_SURFSENSE_STT_SERVICE}
      HF_TOKEN: ${HARBOR_HF_TOKEN}
      TOKENIZERS_PARALLELISM: ${HARBOR_SURFSENSE_TOKENIZERS_PARALLELISM}
      OMP_NUM_THREADS: ${HARBOR_SURFSENSE_OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${HARBOR_SURFSENSE_MKL_NUM_THREADS}
      OPENBLAS_NUM_THREADS: ${HARBOR_SURFSENSE_OPENBLAS_NUM_THREADS}
      NUMEXPR_NUM_THREADS: ${HARBOR_SURFSENSE_NUMEXPR_NUM_THREADS}
      CELERY_MAX_WORKERS: ${HARBOR_SURFSENSE_CELERY_MAX_WORKERS}
      CELERY_MIN_WORKERS: ${HARBOR_SURFSENSE_CELERY_MIN_WORKERS}
      CELERY_MAX_TASKS_PER_CHILD: ${HARBOR_SURFSENSE_CELERY_MAX_TASKS_PER_CHILD}
      STRIPE_PAGE_BUYING_ENABLED: "FALSE"
      NOLOGIN_MODE_ENABLED: ${HARBOR_SURFSENSE_NOLOGIN_MODE_ENABLED}
      DAYTONA_SANDBOX_ENABLED: "FALSE"
    depends_on:
      surfsense-db:
        condition: service_healthy
      surfsense-redis:
        condition: service_healthy
      surfsense-backend:
        condition: service_healthy
    networks:
      - harbor-network

  surfsense-beat:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-beat
    image: ${HARBOR_SURFSENSE_BACKEND_IMAGE}:${HARBOR_SURFSENSE_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}
      CELERY_BROKER_URL: redis://surfsense-redis:6379/0
      CELERY_RESULT_BACKEND: redis://surfsense-redis:6379/0
      CELERY_TASK_DEFAULT_QUEUE: surfsense
      PYTHONPATH: /app
      SERVICE_ROLE: beat
      SECRET_KEY: ${HARBOR_SURFSENSE_SECRET_KEY}
      AUTH_TYPE: ${HARBOR_SURFSENSE_AUTH_TYPE}
      REGISTRATION_ENABLED: ${HARBOR_SURFSENSE_REGISTRATION_ENABLED}
      ETL_SERVICE: ${HARBOR_SURFSENSE_ETL_SERVICE}
      EMBEDDING_MODEL: ${HARBOR_SURFSENSE_EMBEDDING_MODEL}
      RERANKERS_ENABLED: ${HARBOR_SURFSENSE_RERANKERS_ENABLED}
      RERANKERS_MODEL_NAME: ${HARBOR_SURFSENSE_RERANKERS_MODEL_NAME}
      RERANKERS_MODEL_TYPE: ${HARBOR_SURFSENSE_RERANKERS_MODEL_TYPE}
      HF_TOKEN: ${HARBOR_HF_TOKEN}
      TOKENIZERS_PARALLELISM: ${HARBOR_SURFSENSE_TOKENIZERS_PARALLELISM}
      OMP_NUM_THREADS: ${HARBOR_SURFSENSE_OMP_NUM_THREADS}
      MKL_NUM_THREADS: ${HARBOR_SURFSENSE_MKL_NUM_THREADS}
      OPENBLAS_NUM_THREADS: ${HARBOR_SURFSENSE_OPENBLAS_NUM_THREADS}
      NUMEXPR_NUM_THREADS: ${HARBOR_SURFSENSE_NUMEXPR_NUM_THREADS}
    depends_on:
      surfsense-db:
        condition: service_healthy
      surfsense-redis:
        condition: service_healthy
      surfsense-worker:
        condition: service_started
    networks:
      - harbor-network

  surfsense-zero:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-zero
    image: ${HARBOR_SURFSENSE_ZERO_IMAGE}:${HARBOR_SURFSENSE_ZERO_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    ports:
      - ${HARBOR_SURFSENSE_ZERO_HOST_PORT}:4848
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      ZERO_UPSTREAM_DB: postgresql://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}?sslmode=disable
      ZERO_CVR_DB: postgresql://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}?sslmode=disable
      ZERO_CHANGE_DB: postgresql://${HARBOR_SURFSENSE_DB_USER}:${HARBOR_SURFSENSE_DB_PASSWORD}@surfsense-db:5432/${HARBOR_SURFSENSE_DB_NAME}?sslmode=disable
      ZERO_REPLICA_FILE: /data/zero.db
      ZERO_ADMIN_PASSWORD: ${HARBOR_SURFSENSE_ZERO_ADMIN_PASSWORD}
      ZERO_APP_PUBLICATIONS: zero_publication
      ZERO_NUM_SYNC_WORKERS: ${HARBOR_SURFSENSE_ZERO_NUM_SYNC_WORKERS}
      ZERO_UPSTREAM_MAX_CONNS: ${HARBOR_SURFSENSE_ZERO_UPSTREAM_MAX_CONNS}
      ZERO_CVR_MAX_CONNS: ${HARBOR_SURFSENSE_ZERO_CVR_MAX_CONNS}
      ZERO_QUERY_URL: http://surfsense-web:3000/api/zero/query
      ZERO_MUTATE_URL: http://surfsense-web:3000/api/zero/mutate
    volumes:
      - ${HARBOR_SURFSENSE_WORKSPACE}/zero:/data
    depends_on:
      surfsense-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4848/keepalive"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harbor-network

  surfsense-db:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-db
    image: ${HARBOR_SURFSENSE_DB_IMAGE}:${HARBOR_SURFSENSE_DB_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    environment:
      POSTGRES_USER: ${HARBOR_SURFSENSE_DB_USER}
      POSTGRES_PASSWORD: ${HARBOR_SURFSENSE_DB_PASSWORD}
      POSTGRES_DB: ${HARBOR_SURFSENSE_DB_NAME}
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ${HARBOR_SURFSENSE_WORKSPACE}/postgres:/var/lib/postgresql/data
      - ./services/surfsense/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HARBOR_SURFSENSE_DB_USER} -d ${HARBOR_SURFSENSE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harbor-network

  surfsense-redis:
    container_name: ${HARBOR_CONTAINER_PREFIX}.surfsense-redis
    image: ${HARBOR_SURFSENSE_REDIS_IMAGE}:${HARBOR_SURFSENSE_REDIS_VERSION}
    env_file:
      - ./.env
      - ./services/surfsense/override.env
    command: redis-server --appendonly yes
    volumes:
      - ${HARBOR_SURFSENSE_WORKSPACE}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harbor-network
