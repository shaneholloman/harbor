services:
  hermes:
    environment:
      - OPENAI_BASE_URL=http://unsloth-studio:8000/v1
      - OPENAI_API_KEY=${HARBOR_UNSLOTH_STUDIO_API_KEY}
    volumes:
      # Read-only mount of the bootstrap sidecar's persisted key file.
      # The entrypoint wrapper below reads
      # /run/unsloth-studio-auth/api_key.txt at runtime and re-exports
      # OPENAI_API_KEY before exec'ing the CMD. This bypasses Compose's
      # create-time env substitution, which would otherwise bake the
      # placeholder key into the hermes container's Config.Env on the
      # very first `harbor up unsloth-studio hermes`.
      - ./services/unsloth-studio/.studio-auth:/run/unsloth-studio-auth:ro
    # Wrap the upstream CMD with a tiny shell that re-exports the bootstrap
    # key from the sidecar file (if present) and then `exec "$@"` — the
    # `["gateway", "run"]` CMD set by compose.hermes.yml carries through
    # unchanged in the normal `harbor up` path, and `harbor run hermes
    # <cmd>` (which docker compose translates to a CMD override) keeps
    # working because the wrapper passes user args through verbatim. The
    # previous shape (`entrypoint: sh -c` + inline `command:`) consumed
    # only the first arg of any override.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -r /run/unsloth-studio-auth/api_key.txt ]; then
          k=$$(tr -d '\n' < /run/unsloth-studio-auth/api_key.txt)
          [ -n "$$k" ] && export OPENAI_API_KEY="$$k"
        fi
        exec "$$@"
      - sh
    # Defer hermes's start until the bootstrap sidecar has minted and
    # written both .env and the sidecar key file. Combined with the
    # runtime read in the wrapper above, this makes the very first
    # `harbor up unsloth-studio hermes` work end-to-end with no second
    # pass.
    depends_on:
      unsloth-studio-bootstrap:
        condition: service_completed_successfully
