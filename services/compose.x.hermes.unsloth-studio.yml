services:
  hermes:
    environment:
      - OPENAI_BASE_URL=http://unsloth-studio:8000/v1
      - OPENAI_API_KEY=${HARBOR_UNSLOTH_STUDIO_API_KEY}
    volumes:
      # Read-only mount of the bootstrap sidecar's persisted key file.
      # The wrapper below reads /run/unsloth-studio-auth/api_key.txt at
      # runtime and re-exports OPENAI_API_KEY before launching the
      # gateway. This bypasses Compose's create-time env substitution,
      # which would otherwise bake the placeholder key into the hermes
      # container's Config.Env on the very first
      # `harbor up unsloth-studio hermes`.
      - ./services/unsloth-studio/.studio-auth:/run/unsloth-studio-auth:ro
    # Override the upstream `gateway run` command with a small shell
    # wrapper that reads the sidecar key file (if present) and re-exports
    # OPENAI_API_KEY before launching the gateway. Keep the rest of the
    # launch identical to compose.hermes.yml so this stays a thin wrapper.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -r /run/unsloth-studio-auth/api_key.txt ]; then
          k=$$(tr -d '\n' < /run/unsloth-studio-auth/api_key.txt)
          if [ -n "$$k" ]; then
            export OPENAI_API_KEY="$$k"
          fi
        fi
        exec gateway run
    # Defer hermes's start until the bootstrap sidecar has minted and
    # written both .env and the sidecar key file. Combined with the
    # runtime read in the command wrapper above, this makes the very
    # first `harbor up unsloth-studio hermes` work end-to-end with no
    # second pass.
    depends_on:
      unsloth-studio-bootstrap:
        condition: service_completed_successfully
