services:
  mindsdb:
    container_name: ${HARBOR_CONTAINER_PREFIX}.mindsdb
    image: ${HARBOR_MINDSDB_IMAGE}:${HARBOR_MINDSDB_VERSION}
    env_file:
      - ./.env
      - ./services/mindsdb/override.env
    volumes:
      - ${HARBOR_MINDSDB_WORKSPACE}:/root/mdb_storage
    ports:
      - ${HARBOR_MINDSDB_HOST_PORT}:47334
      - ${HARBOR_MINDSDB_MYSQL_HOST_PORT}:47335
    environment:
      - MINDSDB_APIS=${HARBOR_MINDSDB_APIS}
      - MINDSDB_USERNAME=${HARBOR_MINDSDB_USERNAME}
      - MINDSDB_PASSWORD=${HARBOR_MINDSDB_PASSWORD}
      - MKL_SERVICE_FORCE_INTEL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47334/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      mindsdb-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  mindsdb-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.mindsdb-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/mindsdb/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/mindsdb/workspace-init.sh:/init.sh:ro
      - ${HARBOR_MINDSDB_WORKSPACE}:/workspace
    networks:
      - harbor-network
