services:
  localai:
    container_name: ${HARBOR_CONTAINER_PREFIX}.localai
    image: ${HARBOR_LOCALAI_IMAGE}:${HARBOR_LOCALAI_CPU_VERSION}
    env_file:
      - ./.env
      - ./services/localai/override.env
    ports:
      - ${HARBOR_LOCALAI_HOST_PORT}:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1s
      timeout: 10s
      retries: 10
      start_period: 2s
    environment:
      - HUGGINGFACEHUB_API_TOKEN=${HARBOR_HF_TOKEN}
    volumes:
      - ${HARBOR_LOCALAI_WORKSPACE}/models:/build/models
      - ${HARBOR_HF_CACHE:-./services/localai/.hf-cache}:/root/.cache/huggingface
      - ${HARBOR_LLAMACPP_CACHE}:/root/.cache/llama.cpp
      - ${HARBOR_VLLM_CACHE}:/root/.cache/vllm
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      localai-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  localai-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.localai-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/localai/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/localai/workspace-init.sh:/init.sh:ro
      - ${HARBOR_LOCALAI_WORKSPACE}:/workspace
    networks:
      - harbor-network
