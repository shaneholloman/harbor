services:
  kotaemon:
    container_name: ${HARBOR_CONTAINER_PREFIX}.kotaemon
    image: ${HARBOR_KOTAEMON_IMAGE}:${HARBOR_KOTAEMON_VERSION}
    env_file:
      - ./.env
      - ./services/kotaemon/override.env
    entrypoint: ["python", "app.py"]
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    ports:
      - ${HARBOR_KOTAEMON_HOST_PORT}:7860
    volumes:
      - ${HARBOR_KOTAEMON_WORKSPACE}:/app/ktem_app_data
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      kotaemon-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  kotaemon-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.kotaemon-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/kotaemon/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/kotaemon/workspace-init.sh:/init.sh:ro
      - ${HARBOR_KOTAEMON_WORKSPACE}:/workspace
    networks:
      - harbor-network
