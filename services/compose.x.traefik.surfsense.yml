services:
  surfsense:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.surfsense.rule=Host(`surfsense.${HARBOR_TRAEFIK_DOMAIN}`)"
      - "traefik.http.services.surfsense.loadbalancer.server.port=80"
      - "traefik.http.routers.surfsense.entrypoints=websecure"
      - "traefik.http.routers.surfsense.tls=true"
      - "traefik.http.routers.surfsense.service=surfsense"

    networks:
      - traefik-public
