services:
  langfuse:
    image: langfuse/langfuse:3
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse
    depends_on: &langfuse-depends-on
      langfuse-db:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    ports:
      - ${HARBOR_LANGFUSE_HOST_PORT}:3000
    networks:
      - harbor-network

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse-worker
    depends_on: *langfuse-depends-on
    networks:
      - harbor-network

  langfuse-db:
    image: postgres:16
    restart: always
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 1s
      timeout: 5s
      retries: 10
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    ports:
      - ${HARBOR_LANGFUSE_DB_HOST_PORT}:5432
    volumes:
      - ${HARBOR_LANGFUSE_WORKSPACE}/db:/var/lib/postgresql/data
    networks:
      - harbor-network

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse-clickhouse
    hostname: langfuse-clickhouse
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    volumes:
      - ${HARBOR_LANGFUSE_WORKSPACE}/clickhouse-data:/var/lib/clickhouse
      - ${HARBOR_LANGFUSE_WORKSPACE}/clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - harbor-network

  langfuse-minio:
    image: minio/minio
    restart: always
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse-minio
    entrypoint: sh
    # create the 'langfuse' bucket before starting the service
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    volumes:
      - ${HARBOR_LANGFUSE_WORKSPACE}/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s
    networks:
      - harbor-network

  langfuse-redis:
    image: redis:7
    container_name: ${HARBOR_CONTAINER_PREFIX}.langfuse-redis
    restart: always
    # `--maxmemory-policy noeviction` matches upstream Langfuse compose:
    # Langfuse uses Redis for BullMQ job queues (analytics aggregation,
    # async traces). With the default eviction policy under memory
    # pressure, Redis would silently drop queue entries, which the
    # workers can't replay. noeviction rejects new writes instead, so
    # back-pressure surfaces as errors rather than silent data loss.
    command: >
      --requirepass ${REDIS_AUTH:-myredissecret}
      --maxmemory-policy noeviction
    env_file:
      - ./.env
      - ./services/langfuse/override.env
    # Persist the Redis AOF/RDB across `harbor down/up`. Without this
    # mount, every recreate drops in-flight queue entries and any
    # cached session/auth state — visible as analytics gaps and a
    # forced re-login. Mirrors upstream's `langfuse_redis_data:/data`
    # named-volume pattern, but uses a workspace-relative bind mount
    # to match the postgres/clickhouse/minio peers in this compose file.
    volumes:
      - ${HARBOR_LANGFUSE_WORKSPACE}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - harbor-network

