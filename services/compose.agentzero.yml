services:
  agentzero:
    container_name: ${HARBOR_CONTAINER_PREFIX}.agentzero
    image: ${HARBOR_AGENTZERO_IMAGE}:${HARBOR_AGENTZERO_VERSION}
    ports:
      - ${HARBOR_AGENTZERO_HOST_PORT}:80
    volumes:
      - ${HARBOR_AGENTZERO_WORKSPACE}:/a0
    environment:
      - GROQ_API_KEY=${HARBOR_GROQ_KEY}
      - MISTRALAI_API_KEY=${HARBOR_MISTRAL_KEY}
      - OPENROUTER_API_KEY=${HARBOR_OPENROUTER_KEY}
      - ANTHROPIC_API_KEY=${HARBOR_ANTHROPIC_KEY}
      - GOOGLE_API_KEY=${HARBOR_GOOGLE_KEY}
    env_file:
      - ./.env
      - ./services/agentzero/override.env
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      agentzero-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  agentzero-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.agentzero-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/agentzero/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/agentzero/workspace-init.sh:/init.sh:ro
      - ${HARBOR_AGENTZERO_WORKSPACE}:/workspace
    networks:
      - harbor-network
