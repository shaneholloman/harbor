services:
  unsloth:
    container_name: ${HARBOR_CONTAINER_PREFIX}.unsloth
    image: ${HARBOR_UNSLOTH_IMAGE}:${HARBOR_UNSLOTH_VERSION}
    env_file:
      - ./.env
      - ./services/unsloth/override.env
    ports:
      - ${HARBOR_UNSLOTH_HOST_PORT}:8888
      - ${HARBOR_UNSLOTH_SSH_PORT}:22
    environment:
      - JUPYTER_PASSWORD=${HARBOR_UNSLOTH_JUPYTER_PASSWORD}
      - HF_TOKEN=${HARBOR_HF_TOKEN}
    volumes:
      - ${HARBOR_UNSLOTH_WORKSPACE}:/workspace/work
      # Shell-style fallback so an empty HARBOR_HF_CACHE doesn't produce
      # the cryptic `invalid spec: :/root/.cache/huggingface` compose error.
      # The fallback lives under the service dir and is gitignored.
      - ${HARBOR_HF_CACHE:-./services/unsloth/.hf-cache}:/root/.cache/huggingface
    # Wait for the init sidecar to chown the bind-mount target so the
    # workspace dir on the host stays owned by the host user — recoverable
    # without `sudo` even after the upstream entrypoint `chmod -R 777`s it.
    depends_on:
      unsloth-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Docker creates missing bind-mount targets
  # as root:root by default; without this fixup the host dir ends up undeletable
  # without `sudo`. Mirrors the pattern used for unsloth-studio, beszel, and dbhub.
  unsloth-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.unsloth-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/unsloth/override.env
    environment:
      HARBOR_USER_ID: ${HARBOR_USER_ID}
      HARBOR_GROUP_ID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/usr/local/bin/workspace-init.sh"]
    volumes:
      - ./services/unsloth/workspace-init.sh:/usr/local/bin/workspace-init.sh:ro
      - ${HARBOR_UNSLOTH_WORKSPACE}:/workspace/work
    networks:
      - harbor-network
