services:
  webui:
    volumes:
      - ./services/webui/configs/config.unsloth-studio.json:/app/configs/config.unsloth-studio.json
      # Read-only mount of the bootstrap sidecar's persisted key file. The
      # webui start script reads /run/unsloth-studio-auth/api_key.txt at
      # runtime and exports HARBOR_UNSLOTH_STUDIO_API_KEY before invoking
      # the JSON config merger. This bypasses Compose's create-time env
      # substitution, which would otherwise bake the placeholder key into
      # config.json on the very first `harbor up unsloth-studio webui`.
      - ./services/unsloth-studio/.studio-auth:/run/unsloth-studio-auth:ro
    # Defer webui's start until the bootstrap sidecar has minted and
    # written both .env and the sidecar key file. Combined with the
    # runtime read in start_webui.sh, this makes the very first
    # `harbor up unsloth-studio webui` work end-to-end with no second pass.
    depends_on:
      unsloth-studio-bootstrap:
        condition: service_completed_successfully
