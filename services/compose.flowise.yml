
services:
  flowise:
    container_name: ${HARBOR_CONTAINER_PREFIX}.flowise
    image: ${HARBOR_FLOWISE_IMAGE}:${HARBOR_FLOWISE_VERSION}
    ports:
      - ${HARBOR_FLOWISE_HOST_PORT}:3000
    volumes:
      # Persistence
      - ${HARBOR_FLOWISE_WORKSPACE}:/root/.flowise
    env_file:
      - ./.env
      - ./services/flowise/override.env
    # Wait for the init sidecar to chown the workspace bind mount so the
    # host directory stays owned by the host user — recoverable without
    # `sudo`. Docker creates missing bind-mount targets as root:root by
    # default; this fixup runs before the main container starts.
    depends_on:
      flowise-init:
        condition: service_completed_successfully
    networks:
      - harbor-network

  # Init sidecar: chowns the workspace bind mount to HARBOR_USER_ID:HARBOR_GROUP_ID
  # before the main container starts. Mirrors the pattern used for unsloth-studio
  # and beszel.
  flowise-init:
    container_name: ${HARBOR_CONTAINER_PREFIX}.flowise-init
    image: alpine:3.20
    env_file:
      - ./.env
      - ./services/flowise/override.env
    environment:
      TARGET_UID: ${HARBOR_USER_ID}
      TARGET_GID: ${HARBOR_GROUP_ID}
    entrypoint: ["/bin/sh", "/init.sh"]
    volumes:
      - ./services/flowise/workspace-init.sh:/init.sh:ro
      - ${HARBOR_FLOWISE_WORKSPACE}:/workspace
    networks:
      - harbor-network
