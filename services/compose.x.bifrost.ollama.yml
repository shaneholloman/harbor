services:
  bifrost-ollama-bootstrap:
    container_name: ${HARBOR_CONTAINER_PREFIX}.bifrost-ollama-bootstrap
    image: ${HARBOR_BIFROST_BOOTSTRAP_IMAGE}:${HARBOR_BIFROST_BOOTSTRAP_VERSION}
    env_file:
      - ./.env
      - ./services/bifrost/override.env
    environment:
      BIFROST_URL: http://bifrost:${HARBOR_BIFROST_APP_PORT}
      BIFROST_PROVIDER: ollama
      BIFROST_PROVIDER_KIND: ollama
      BIFROST_PROVIDER_BASE_URL: ${HARBOR_OLLAMA_INTERNAL_URL}
      BIFROST_KEY_ID: harbor-ollama
      BIFROST_KEY_NAME: Harbor Ollama
      BIFROST_MODELS: ${HARBOR_BIFROST_OLLAMA_MODELS}
    entrypoint: ["/bin/sh", "/usr/local/bin/bootstrap-provider.sh"]
    volumes:
      - ./services/bifrost/bootstrap-provider.sh:/usr/local/bin/bootstrap-provider.sh:ro
    depends_on:
      bifrost:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - harbor-network
